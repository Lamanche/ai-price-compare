name: Update Subscription Prices

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: # Allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch and update subscription prices
        run: node scripts/fetch-subscriptions.mjs
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}

      - name: Commit changes if any
        run: |
          git config user.name "pricing-bot"
          git config user.email "bot@github.com"
          git add data/subscriptions.json
          if git diff --cached --quiet; then
            echo "No price changes detected"
          else
            git commit -m "chore: update subscription prices $(date -u +%Y-%m-%d)"
            git push
          fi
